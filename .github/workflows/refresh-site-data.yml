name: Refresh site data

# Regenerates the portfolio site's read-only JSON snapshots (docs/data) and commits
# them back to main, where GitHub Pages (deploy from branch main:/docs) serves them.
# Auth is a least-privilege, read-only BigQuery service account (secret GCP_SA_KEY).

on:
  schedule:
    - cron: "0 17 * * *"   # daily, after the 14:00 UTC pipeline + transcripts
  workflow_dispatch: {}

permissions:
  contents: write          # commit refreshed docs/data back to main

concurrency:
  group: refresh-site-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --frozen

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Generate snapshots
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_LOCATION: ${{ secrets.BQ_LOCATION }}
        run: uv run mt generate-site-data --out-dir docs/data

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(site): refresh data snapshots [skip ci]"
          file_pattern: docs/data/*.json
