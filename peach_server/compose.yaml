# One image (mt:latest) for every run mode. The `transcripts` service builds it
# (whisper baked in); the others reuse the same image. Shared config — image,
# env, ADC mount, restart policy — lives in the `&mt` anchor so it's defined once.
x-mt: &mt
  image: mt:latest
  env_file:
    - .env
  volumes:
    # Snap docker hides dot-files in $HOME, so we mount a non-hidden copy of
    # the ADC (see README for the one-time copy step).
    - ./gcloud:/root/.config/gcloud:ro
  restart: "no"

services:
  # Residential-IP transcripts pass (YouTube blocks GCP egress). Builds the
  # shared mt:latest image. Predictions are skipped here — they run on the Cloud
  # Run daily job right after the stats phase (fresh data); the writes are
  # idempotent regardless.
  transcripts:
    <<: *mt
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        WHISPER_BAKE_MODEL: medium
    command:
      - run-daily
      - --skip-movies
      - --skip-tv
      - --skip-stats
      - --skip-comments
      - --skip-predictions

  # Weekly digest email: country stats + prediction scoreboard + draft posts.
  # Needs SMTP_* + DIGEST_EMAIL_TO in .env. --polish (Claude rewrite) additionally
  # needs ANTHROPIC_API_KEY; it falls back to template drafts without one.
  digest:
    <<: *mt
    command:
      - send-digest
      - --period=week
      - --polish

  # Read-only MCP server over streamable-HTTP. Long-running (unlike the batch
  # services above), so it overrides the anchor's restart policy. The port is
  # published to 127.0.0.1 only — reachable from this machine, never the LAN or
  # internet. A local MCP client connects to http://localhost:${MCP_PORT}/mcp.
  # Start with: docker compose up -d mcp
  mcp:
    <<: *mt
    command:
      - mcp
      - --http
      - --host=0.0.0.0
      - --port=8000
    ports:
      - "127.0.0.1:${MCP_PORT:-8000}:8000"
    restart: unless-stopped

  # One-off: regenerate the portfolio site's read-only JSON snapshots straight
  # into the host repo's docs/data, for the cron that commits + pushes them
  # (refresh-site-data.sh). Read-only BigQuery — no writes. The service-level
  # volumes replace the anchor's, so the ADC mount is repeated here.
  site-data:
    <<: *mt
    command:
      - generate-site-data
      - --out-dir=/out
    volumes:
      - ./gcloud:/root/.config/gcloud:ro
      - ../docs/data:/out
